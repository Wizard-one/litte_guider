<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>校园小导游 · 路线挑战</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="welcomeScreen" class="welcome-screen scale-target is-active" aria-label="欢迎界面">
    <section class="welcome-hero">
      <h1><img class="welcome-logo" src="img/avatar.png" alt="校园小导游" /> 校园小导游</h1>
      <p>今天你想帮助哪位老师规划游览路线呢?</p>
    </section>

    <section class="entry-grid" aria-label="路线模式选择">
      <button class="entry-card" type="button" data-entry-mode="art">
        <span class="entry-icon" aria-hidden="true">🎨</span>
        <h2>美术老师</h2>
      </button>

      <button class="entry-card" type="button" data-entry-mode="sport">
        <span class="entry-icon" aria-hidden="true">⚽</span>
        <h2>体育老师</h2>
      </button>

      <button class="entry-card" type="button" data-entry-mode="custom">
        <span class="entry-icon" aria-hidden="true">🗺️</span>
        <h2>我想自主设计路线</h2>
      </button>
    </section>
  </main>

  <main id="appScreen" class="app scale-target" aria-label="操作界面">
    <header class="topbar">
      <div class="title-group">
        <h1 id="appModeTitle">🗺️ 自主设计校园游览路线</h1>
        <p id="appModeSubtitle">请按“地点 → 方向 → 地点”拖拽路线，系统会按地图道路播放你的移动路线哦。</p>
      </div>
      <button id="backToWelcomeBtn" class="back-home-btn" type="button">返回首页</button>
    </header>

    <section class="main-grid">
      <article class="panel map-panel">
        <h2>校园地图</h2>
        <div class="map-stage">
          <svg id="campusMap" viewBox="0 0 1035 1052" class="campus-map" aria-label="校园地图">
            <image href="img/地点参考.png" x="0" y="0" width="1035" height="1052" preserveAspectRatio="xMidYMid meet"></image>
            <g id="roads"></g>
            <g id="spotLayer"></g>
            <polyline id="userPath" fill="none" stroke="#0ea5e9" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"></polyline>
            <image id="playerAvatar" href="img/avatar.png" width="150" height="150" visibility="hidden"></image>
          </svg>
          <div class="spot-overlay">
            <img id="spotImage" class="spot-image" alt="景点图片" />
          </div>
        </div>
        <div id="stepInfo" class="step-info">等待提交路线...</div>
      </article>

      <article class="panel operation-panel">
        <h2>操作面板</h2>


        <h3>选景点</h3>
        <div id="spotPool" class="spot-pool" aria-label="景点拖拽池"></div>

        <h3>定方向</h3>
        <div id="directionPool" class="direction-pool" aria-label="方向拖拽池">
          <button class="drag-item dir-item" draggable="true" data-type="direction" data-value="E">东</button>
          <button class="drag-item dir-item" draggable="true" data-type="direction" data-value="S">南</button>
          <button class="drag-item dir-item" draggable="true" data-type="direction" data-value="W">西</button>
          <button class="drag-item dir-item" draggable="true" data-type="direction" data-value="N">北</button>
        </div>

        <h3>我的导游路线</h3>
        <div id="routeDropZone" class="route-drop-zone" aria-label="路线拖拽区">
          <p id="routePlaceholder" class="route-placeholder">将景点和方向拖到这里</p>
          <div id="routeTimeline" class="route-timeline"></div>
        </div>
        <div class="actions route-actions">
          <button id="startBtn">提交路线</button>
          <div id="trashDropZone" class="trash-drop-zone" aria-label="垃圾桶删除区">
            <svg viewBox="0 0 24 24" class="trash-icon" aria-hidden="true">
              <path d="M9 3h6l1 2h4v2H4V5h4l1-2zm-2 6h2v9H7V9zm4 0h2v9h-2V9zm4 0h2v9h-2V9z" fill="currentColor"></path>
            </svg>
            <span>拖到这里删除路线项</span>
          </div>
          <button id="resetBtn" class="secondary">一键清空并重置</button>
        </div>
        <div id="message" class="message"></div>
      </article>
    </section>

  </main>

  <div id="evaluationModal" class="evaluation-modal" aria-hidden="true">
    <div class="evaluation-panel" role="dialog" aria-modal="true" aria-labelledby="evaluationTitle">
      <h2 id="evaluationTitle">路线评价</h2>
      <div id="evaluationGrid" class="evaluation-grid">
        <div class="evaluation-item" data-criteria="direction">
          <span class="evaluation-star" aria-hidden="true">⭐</span>
          <span class="evaluation-label">定准方向</span>
        </div>
        <div class="evaluation-item" data-criteria="spot">
          <span class="evaluation-star" aria-hidden="true">⭐</span>
          <span class="evaluation-label">讲清地点</span>
        </div>
        <div class="evaluation-item" data-criteria="route">
          <span class="evaluation-star" aria-hidden="true">⭐</span>
          <span class="evaluation-label">定好路线</span>
        </div>
        <div class="evaluation-item" data-criteria="demand">
          <span class="evaluation-star" aria-hidden="true">⭐</span>
          <span class="evaluation-label">符合需求</span>
        </div>
      </div>
      <p id="evaluationHint" class="evaluation-hint"></p>
      <button id="evaluationCloseBtn" class="evaluation-close-btn" type="button">继续</button>
    </div>
  </div>

  <script src="loc-data.js"></script>
  <script src="script.js"></script>
</body>
</html>
