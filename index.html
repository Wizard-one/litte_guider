<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>校园小导游 · 路线挑战</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1>校园小导游 · 路线挑战</h1>
      <p>请按“地点 → 方向 → 地点”拖拽路线，系统会按地图道路播放avatar移动动画。</p>
    </header>

    <section class="main-grid">
      <article class="panel map-panel">
        <h2>校园地图</h2>
        <svg id="campusMap" viewBox="0 0 1035 1052" class="campus-map" aria-label="校园地图">
          <image href="img/地点参考.jpg" x="0" y="0" width="1035" height="1052" preserveAspectRatio="xMidYMid meet"></image>
          <g id="roads"></g>
          <g id="spotLayer"></g>
          <polyline id="userPath" fill="none" stroke="#0ea5e9" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"></polyline>
          <image id="playerAvatar" href="img/avatar.png" width="44" height="44" visibility="hidden"></image>
        </svg>
        <div id="stepInfo" class="step-info">等待开始演示...</div>
      </article>

      <article class="panel operation-panel">
        <h2>操作面板</h2>
        <p class="hint">请按“地点 → 方向 → 地点”交替拖拽，地点不能重复，且至少经过3个地点才算合法。</p>

        <h3>选景点</h3>
        <div id="spotPool" class="spot-pool" aria-label="景点拖拽池"></div>

        <h3>定方向</h3>
        <div id="directionPool" class="direction-pool" aria-label="方向拖拽池">
          <button class="drag-item dir-item" draggable="true" data-type="direction" data-value="E">东</button>
          <button class="drag-item dir-item" draggable="true" data-type="direction" data-value="S">南</button>
          <button class="drag-item dir-item" draggable="true" data-type="direction" data-value="W">西</button>
          <button class="drag-item dir-item" draggable="true" data-type="direction" data-value="N">北</button>
        </div>

        <h3>我的导游路线</h3>
        <div id="routeDropZone" class="route-drop-zone" aria-label="路线拖拽区">
          <p id="routePlaceholder" class="route-placeholder">将景点和方向拖到这里</p>
          <div id="routeTimeline" class="route-timeline"></div>
        </div>

        <div class="actions">
          <button id="startBtn">开始演示</button>
          <button id="clearRouteBtn" class="secondary">一键清空路线</button>
          <button id="resetBtn" class="ghost">重置全部</button>
        </div>
        <div id="message" class="message"></div>
      </article>
    </section>

    <section class="single-grid">
      <article class="panel spot-panel">
        <h2>当前景点图文</h2>
        <img id="spotImage" class="spot-image" alt="景点图片" />
        <h3 id="spotTitle">未开始</h3>
        <p id="spotDesc">拖拽并播放路线后，会展示当前到达的景点。</p>
      </article>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
