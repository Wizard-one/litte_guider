    &lt;script&gt;
        const spots = [
            { id: 'wyff', name: '雏燕奋飞', x: 180, y: 250, img: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/vCgowo36JBfVQt64BKA5jP.jpg' },
            { id: 'yqkj', name: '艺趣空间', x: 450, y: 100, img: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/kH8bgodkpvGzYekp8NPtd3.jpg' },
            { id: 'lxj', name: '恐龙角', x: 450, y: 200, img: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/Wt4Se3aZBpcAZMFEs8Fo3b.jpg' },
            { id: 'zqly', name: '足球乐园', x: 480, y: 380, img: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/Bes8VxzqvUj5LeWZGvXiSG.jpg' },
            { id: 'ttqhj', name: '甜甜圈花园', x: 430, y: 450, img: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/VY9G43VNZefFWuUjKhVydk.jpg' },
            { id: 'yyzt', name: '友谊之亭', x: 280, y: 450, img: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/kS8c2q9VMMAZ6MAnA2D9k8.jpg' }
        ];

        const directions = [
            { id: 'north', name: '向北走' },
            { id: 'south', name: '向南走' },
            { id: 'east', name: '向东走' },
            { id: 'west', name: '向西走' }
        ];

        const gatePos = { x: 80, y: 250 };
        let draggedData = null;

        function startGame() {
            document.getElementById('intro-screen').classList.add('hidden');
            document.getElementById('route-screen').classList.remove('hidden');
            renderPools();
            initDragAndDrop();
        }

        function renderPools() {
            const sPool = document.getElementById('spot-pool');
            spots.forEach(s =&gt; {
                const el = createDraggable(s.name, 'spot', s.id);
                sPool.appendChild(el);
            });

            const dPool = document.getElementById('dir-pool');
            directions.forEach(d =&gt; {
                const el = createDraggable(d.name, 'dir', d.id);
                dPool.appendChild(el);
            });
        }

        function createDraggable(name, type, id) {
            const el = document.createElement('div');
            el.className = `draggable-item ${type === 'spot' ? 'spot-item' : 'dir-item'}`;
            el.draggable = true;
            el.innerText = name;
            el.dataset.id = id;
            el.dataset.type = type;
            el.addEventListener('dragstart', (e) =&gt; {
                draggedData = { id, name, type };
                el.classList.add('opacity-40');
            });
            el.addEventListener('dragend', () =&gt; el.classList.remove('opacity-40'));
            return el;
        }

        function initDragAndDrop() {
            const placeholders = document.querySelectorAll('.drop-placeholder:not([data-fixed])');
            placeholders.forEach(p =&gt; {
                p.addEventListener('dragover', (e) =&gt; {
                    if (draggedData &amp;&amp; draggedData.type === p.dataset.type) {
                        e.preventDefault();
                        p.classList.add('active');
                    }
                });
                p.addEventListener('dragleave', () =&gt; p.classList.remove('active'));
                p.addEventListener('drop', (e) =&gt; {
                    e.preventDefault();
                    p.classList.remove('active');
                    if (draggedData &amp;&amp; draggedData.type === p.dataset.type) {
                        p.innerText = draggedData.name;
                        p.dataset.val = draggedData.id;
                        p.classList.add('filled');
                        updateSubmitState();
                        updateMapMarkers();
                    }
                });
            });
        }

        function updateSubmitState() {
            const filled = document.querySelectorAll('.drop-placeholder.filled').length;
            const btn = document.getElementById('submit-btn');
            btn.disabled = filled &lt; 5;
        }

        function updateMapMarkers() {
            const markers = document.getElementById('markers-layer');
            markers.innerHTML = '';
            addMarker(gatePos.x, gatePos.y, '大门');
            
            for(let i=1; i&lt;=3; i++) {
                const spotId = document.getElementById(`spot-${i}`).dataset.val;
                if(spotId) {
                    const spot = spots.find(s =&gt; s.id === spotId);
                    addMarker(spot.x, spot.y, spot.name);
                }
            }
        }

        function addMarker(x, y, label) {
            const g = document.createElementNS(&quot;http://www.w3.org/2000/svg&quot;, &quot;g&quot;);
            g.innerHTML = `&lt;circle cx=&quot;${x}&quot; cy=&quot;${y}&quot; r=&quot;6&quot; class=&quot;spot-marker&quot; /&gt;&lt;text x=&quot;${x}&quot; y=&quot;${y - 12}&quot; text-anchor=&quot;middle&quot; font-size=&quot;12&quot; font-weight=&quot;bold&quot; fill=&quot;#1e40af&quot;&gt;${label}&lt;/text&gt;`;
            document.getElementById('markers-layer').appendChild(g);
        }

        function analyzeRoute() {
            const route = [];
            for(let i=1; i&lt;=3; i++) {
                const sId = document.getElementById(`spot-${i}`).dataset.val;
                const dId = document.getElementById(`dir-${i}`).dataset.val;
                if(sId &amp;&amp; dId) route.push({ spot: spots.find(s =&gt; s.id === sId), dir: dId });
            }

            let isLogical = true;
            let currentPos = gatePos;
            route.forEach(step =&gt; {
                const dx = step.spot.x - currentPos.x;
                const dy = step.spot.y - currentPos.y;
                if (step.dir === 'north' &amp;&amp; dy &gt; 0) isLogical = false;
                if (step.dir === 'south' &amp;&amp; dy &lt; 0) isLogical = false;
                if (step.dir === 'east' &amp;&amp; dx &lt; 0) isLogical = false;
                if (step.dir === 'west' &amp;&amp; dx &gt; 0) isLogical = false;
                currentPos = step.spot;
            });

            drawAnimation(route);
            setTimeout(() =&gt; showResult(isLogical, route.length), (route.length + 1) * 2000 + 1000);
        }

        function drawAnimation(route) {
            const path = document.getElementById('anim-path');
            const overlay = document.getElementById('spot-preview-overlay');
            const previewImg = document.getElementById('preview-img');
            const previewName = document.getElementById('preview-name');
            
            let d = `M ${gatePos.x} ${gatePos.y}`;
            route.forEach(step =&gt; d += ` L ${step.spot.x} ${step.spot.y}`);
            path.setAttribute('d', d);
            path.style.strokeDashoffset = '1000';

            const timeline = anime.timeline({
                easing: 'easeInOutSine',
                complete: () =&gt; {
                    overlay.classList.remove('show');
                }
            });

            timeline.add({
                targets: '#anim-path',
                strokeDashoffset: [1000, 0],
                duration: 2500,
                begin: () =&gt; overlay.classList.remove('show')
            });

            route.forEach((step, index) =&gt; {
                timeline.add({
                    duration: 2000,
                    begin: () =&gt; {
                        previewImg.src = step.spot.img;
                        previewName.innerText = `📍 到达：${step.spot.name}`;
                        overlay.classList.add('show');
                    },
                    complete: () =&gt; {
                        if (index &lt; route.length - 1) {
                            overlay.classList.remove('show');
                        }
                    }
                });
            });
        }

        function showResult(isLogical, len) {
            document.getElementById('route-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            const criteria = { direction: isLogical, route: true, location: true, demand: len &gt;= 2 };
            const score = Object.values(criteria).filter(Boolean).length;
            document.getElementById('final-stars').innerHTML = '⭐'.repeat(score) + '☆'.repeat(4 - score);
            renderCrit('crit-direction', criteria.direction);
            renderCrit('crit-route', true);
            renderCrit('crit-location', true);
            renderCrit('crit-demand', criteria.demand);
            document.getElementById('expert-feedback').innerText = score === 4 ? &quot;完美！你规划的路线非常专业。&quot; : &quot;不错！注意观察地图方位，选择更准确的方向词。&quot;;
        }

        function renderCrit(id, pass) {
            document.getElementById(id).innerHTML = `&lt;span class=&quot;feedback-tag ${pass ? 'tag-pass' : 'tag-fail'}&quot;&gt;${pass ? '✓ 达标' : '✗ 待改进'}&lt;/span&gt;`;
        }
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>
